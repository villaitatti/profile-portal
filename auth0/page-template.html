<!DOCTYPE html>
<html lang="en">
  <head>
    {%- auth0:head -%}
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #faf9f7;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .page-wrapper {
        width: 100%;
        max-width: 480px;
        padding: 2rem 1rem;
      }

      .logo-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .logo-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #5a1a1a;
        letter-spacing: -0.025em;
        margin: 0;
      }

      .logo-header p {
        font-size: 0.875rem;
        color: #6b6560;
        margin: 0.25rem 0 0;
      }

      .claim-section {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e0db;
      }

      .claim-section p {
        font-size: 0.8125rem;
        color: #6b6560;
        margin: 0 0 0.75rem;
      }

      .claim-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #5a1a1a;
        text-decoration: none;
        padding: 0.5rem 1.25rem;
        border: 1px solid #5a1a1a;
        border-radius: 0.375rem;
        transition: all 0.15s ease;
      }

      .claim-link:hover {
        background-color: #5a1a1a;
        color: #fff;
      }

      .footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.75rem;
        color: #9b9590;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="logo-header">
        <h1>I Tatti</h1>
        <p>The Harvard University Center for Italian Renaissance Studies</p>
      </div>

      {%- auth0:widget -%}

      <div class="claim-section">
        <p>Are you an I Tatti fellow without a VIT ID?</p>
        <!--
          IMPORTANT: Replace the URL below with your actual portal domain.
          Example: https://portal.itatti.harvard.edu/claim
        -->
        <a href="https://portal.itatti.harvard.edu/claim" class="claim-link">
          Claim your VIT ID
        </a>
      </div>

      <div class="footer">
        <p>&copy; I Tatti — The Harvard University Center for Italian Renaissance Studies</p>
      </div>
    </div>
  </body>
</html>
