x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "7"

services:
  portal:
    build:
      context: .
      args:
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE}
        VITE_AUTH0_CALLBACK_URL: ${VITE_AUTH0_CALLBACK_URL}
        VITE_AUTH0_NAMESPACE: ${VITE_AUTH0_NAMESPACE}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - itatti-tunnel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: profile_portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

networks:
  internal:
    driver: bridge
  itatti-tunnel:
    external: true

volumes:
  pgdata:
